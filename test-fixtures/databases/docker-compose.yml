services:
  postgres:
    image: postgres:16-alpine
    container_name: deotter-postgres-fixture
    environment:
      POSTGRES_DB: deotter
      POSTGRES_USER: deotter
      POSTGRES_PASSWORD: deotter
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deotter -d deotter"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  mysql:
    image: mysql:8.4
    container_name: deotter-mysql-fixture
    environment:
      MYSQL_DATABASE: deotter
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_USER: deotter
      MYSQL_PASSWORD: deotter
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -prootpass"]
      interval: 10s
      timeout: 5s
      retries: 20
    volumes:
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: deotter-mssql-fixture
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: "StrongPassw0rd!"
    ports:
      - "1433:1433"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -No -Q \"SELECT 1\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 30
    volumes:
      - ./mssql/init.sql:/fixtures/mssql/init.sql:ro
